stages:
  - fmt
  - lint
  - test

variables:
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/pkg/mod"
  GOPATH: "$CI_PROJECT_DIR/.cache/gopath"
  GOBIN: "$GOPATH/bin"
  GOFLAGS: "-mod=readonly"

default: &default
  image: golang:1.25.1
  before_script:
    - mkdir -p "$GOMODCACHE" "$GOPATH" "$GOBIN"
    - export PATH="$GOBIN:$PATH"
    - go env
    - go version

cache:
  key:
    files:
      - go.sum
  paths:
    - .cache/pkg/mod
    - .cache/gopath

fmt:
  <<: *default
  stage: fmt
  script:
    - if [ ! -x "$GOBIN/gofumpt" ]; then go install mvdan.cc/gofumpt@v0.8.0; fi
    - CHANGED=$(gofumpt -l . | wc -l)
    - if [ "$CHANGED" -ne 0 ]; then echo "Files not gofumpt-formatted:"; gofumpt -l .; exit 1; fi
  cache:
    policy: pull-push
  rules:
    - exists:
        - "**/*.go"

lint:
  <<: *default
  stage: lint
  variables:
    GOLANGCI_LINT_VERSION: "v2.4.0"
  script:
    - if [ ! -x "$GOBIN/golangci-lint" ]; then
        ARCHIVE="golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64.tar.gz";
        URL="https://github.com/golangci/golangci-lint/releases/download/${GOLANGCI_LINT_VERSION}/${ARCHIVE}";
        curl -fsSL "$URL" -o /tmp/${ARCHIVE};
        tar -xzf /tmp/${ARCHIVE} -C /tmp;
        mv /tmp/golangci-lint-${GOLANGCI_LINT_VERSION}-linux-amd64/golangci-lint "$GOBIN/";
        rm -rf /tmp/${ARCHIVE} /tmp/golangci-lint-*/;
      fi
    - golangci-lint --version
    - golangci-lint run ./...
  cache:
    policy: pull-push
  rules:
    - exists:
        - "**/*.go"

test:
  <<: *default
  stage: test
  script:
    - go test ./... -v
  cache:
    policy: pull-push
  rules:
    - exists:
        - "**/*.go"
